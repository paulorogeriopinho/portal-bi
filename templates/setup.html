<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Configuração Inicial — Portal BI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px; width: 100%; max-width: 420px;
    }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    p { font-size: 13px; color: #888; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 18px; outline: none;
    }
    input:focus { border-color: #4f46e5; }
    button {
      width: 100%; padding: 12px; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Configuração inicial</h1>
    <p>Crie o primeiro usuário administrador do portal.</p>
    <form method="POST" action="/setup">
      <label>Nome</label>
      <input type="text" name="name" placeholder="Seu nome" required autofocus>
      <label>Email</label>
      <input type="email" name="email" placeholder="admin@empresa.com" required>
      <label>Senha</label>
      <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>
      <button type="submit">Criar administrador</button>
    </form>
  </div>
</body>
</html>

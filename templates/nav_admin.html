{% set path = request.path %}
{% if user is defined and user.is_admin %}
  <a href="/dashboard"
     class="pp-nav-link {% if path == '/dashboard' %}active{% endif %}">
    Dashboard
  </a>
  <a href="/admin/groups"
     class="pp-nav-link {% if path.startswith('/admin/groups') %}active{% endif %}">
    Grupos
  </a>
  <a href="/admin/reports"
     class="pp-nav-link {% if path.startswith('/admin/reports') %}active{% endif %}">
    Relatórios
  </a>
  <a href="/admin/users"
     class="pp-nav-link {% if path.startswith('/admin/users') %}active{% endif %}">
    Usuários
  </a>
  <a href="/admin/roles"
     class="pp-nav-link {% if path.startswith('/admin/roles') %}active{% endif %}">
    Perfis
  </a>
  
  <a href="/admin/permissions"
     class="pp-nav-link {% if path.startswith('/admin/permissions') %}active{% endif %}">
    Permissões
  </a>
  <a href="/admin/logs"
     class="pp-nav-link {% if path.startswith('/admin/logs') %}active{% endif %}">
    Logs
  </a>
  <a href="/admin/settings"
     class="pp-nav-link {% if path.startswith('/admin/settings') %}active{% endif %}">
    Configurações
  </a>
{% else %}
  <a href="/dashboard"
     class="pp-nav-link {% if path == '/dashboard' %}active{% endif %}">
    Dashboard
  </a>
{% endif %}
<a href="/logout" class="pp-nav-link">Sair</a>
